<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 뭐 먹지? - 프리미엄 식단 추천</title>
    <!-- 폰트 적용 (Pretendard) -->
    <link rel="stylesheet" as="style" crossorigin
        href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="background-animation"></div>

    <div class="container">
        <header>
            <h1>오늘 뭐 먹지?</h1>
            <p>당신의 완벽한 한 끼를 추천해 드립니다</p>
        </header>

        <main>
            <div class="controls">
                <div class="category-filters" id="categoryFilters">
                    <button class="filter-btn active" data-category="all">전체</button>
                    <!-- JavaScript로 카테고리 버튼이 동적 생성됩니다 -->
                </div>
                <button id="recommendBtn" class="recommend-btn">메뉴 추천받기 🎲</button>
            </div>

            <div class="result-card hidden" id="resultCard">
                <div class="card-inner">
                    <span class="category-badge" id="resultCategory">한식</span>
                    <h2 class="food-name" id="resultName">김치찌개</h2>

                    <div class="food-details">
                        <div class="detail-item">
                            <span class="detail-label">제철</span>
                            <span class="detail-value" id="resultSeason">사계절</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">주재료</span>
                            <span class="detail-value" id="resultIngredients">김치, 돼지고기, 두부</span>
                        </div>
                    </div>
                </div>
            </div>


        </main>
    </div>

    <!-- 데이터 파일 로드 -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>

</html>
